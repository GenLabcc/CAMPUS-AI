name: Frontend CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # --- CI Job: Lint and Build ---
  build-and-lint:
    name: Lint & Build Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Test Build
      run: npm run build
      env:
        # Pass mock or staging API URL if required during build time
        VITE_API_URL: "http://localhost:8001"
